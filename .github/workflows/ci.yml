# Place this file at: .github/workflows/ci.yml
#
# Runs the full QA suite against a fresh OWASP Juice Shop container on every
# change, then publishes the merged Playwright HTML report to GitHub Pages.
#
#   functional-tests  gating        UI + API + DB suites must pass
#   security-tests    informational confirmation + target-state specs, never blocks
#   zap-baseline      informational DAST safety net, report only
#   publish-report    deploys the merged HTML report to Pages (even on failure)
#
# One-time setup in the repo: Settings > Pages > Source = "GitHub Actions",
# and package.json "lint"/"typecheck" scripts (the gating job runs "validate").

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Pages deployment needs these three. issues:write is intentionally NOT granted,
# because the ZAP step has issue writing disabled below.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one Pages deployment at a time and never cancel one mid-flight.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: "24"            # Juice Shop v20 needs a current Node; 24 is the current LTS
  BASE_URL: "http://localhost:3000"

jobs:
  # ---------------------------------------------------------------------------
  lint-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run validate   # eslint + tsc --noEmit (lint + type errors gate)

  # ---------------------------------------------------------------------------
  functional-tests:
    name: Functional tests (gating)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      # docker-compose.yml must expose Juice Shop on port 3000.
      - name: Start Juice Shop
        run: docker compose up -d --wait

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run functional suite
        run: npx playwright test tests/ui tests/api tests/db --reporter=blob

      # Upload even on failure so the report still publishes.
      - name: Upload functional blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-functional
          path: blob-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  security-tests:
    name: Security regression (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Non-gating by design. Confirmation tests pass because the app is
    # vulnerable, and the target-state specs are expected-failures, so a normal
    # run is green. This flag keeps an unexpected result from blocking a merge.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - name: Start Juice Shop
        run: docker compose up -d --wait

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run security regression suite
        run: npx playwright test tests/security --reporter=blob

      - name: Upload security blob report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: blob-report-security
          path: blob-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  zap-baseline:
    name: ZAP baseline scan (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Start Juice Shop
        run: docker compose up -d --wait

      # The action attaches its HTML/Markdown report to the run as an artifact
      # named "zap_scan" automatically.
      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ env.BASE_URL }}
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          rules_file_name: ".zap/rules.tsv"   # alert allowlist (see that file)
          cmd_options: "-a"                    # include alpha passive scan rules
          # The target is deliberately vulnerable, so do NOT fail the build on
          # alerts, and do NOT auto-open issues on every run.
          fail_action: false
          allow_issue_writing: false

  # ---------------------------------------------------------------------------
  publish-report:
    name: Publish HTML report to Pages
    needs: [functional-tests, security-tests]
    if: ${{ !cancelled() }}      # publish even if functional tests failed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v8
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge blobs into one HTML report
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
